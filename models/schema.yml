version: 2

# ============================================================
# SOURCES — tables brutes chargées depuis S3 dans Snowflake
# ============================================================
sources:
  - name: music_source
    database: MUSIC_EVAL
    schema: MUSIC_SCHEMA
    tables:
      - name: TRACK
      - name: ALBUM
      - name: ARTIST
      - name: GENRE
      - name: MEDIATYPE
      - name: PLAYLIST
      - name: PLAYLISTTRACK

# ============================================================
# MODELS STAGING
# ============================================================
models:
  - name: stg_track
    description: "Staging — morceaux musicaux"
    columns:
      - name: track_id
        description: "Clé primaire du morceau"
        tests:
          - unique
          - not_null

  - name: stg_album
    description: "Staging — albums"
    columns:
      - name: album_id
        tests:
          - unique
          - not_null

  - name: stg_artist
    description: "Staging — artistes"
    columns:
      - name: artist_id
        tests:
          - unique
          - not_null

  - name: stg_genre
    description: "Staging — genres musicaux"
    columns:
      - name: genre_id
        tests:
          - unique
          - not_null

  - name: stg_mediatype
    description: "Staging — types de média"
    columns:
      - name: mediatype_id
        tests:
          - unique
          - not_null

# ============================================================
# MODELS STAR SCHEMA
# ============================================================
  - name: dim_album
    description: "Dimension album"
    config:
      tags: ["star_schema"]
    columns:
      - name: album_id
        tests:
          - unique
          - not_null

  - name: dim_artist
    description: "Dimension artiste"
    config:
      tags: ["star_schema"]
    columns:
      - name: artist_id
        tests:
          - unique
          - not_null

  - name: dim_genre
    description: "Dimension genre musical"
    config:
      tags: ["star_schema"]
    columns:
      - name: genre_id
        tests:
          - unique
          - not_null

  - name: dim_mediatype
    description: "Dimension type de média"
    config:
      tags: ["star_schema"]
    columns:
      - name: mediatype_id
        tests:
          - unique
          - not_null

  - name: fact_track
    description: "Table de faits — tracks musicaux"
    config:
      tags: ["star_schema"]
    columns:
      - name: track_id
        tests:
          - unique
          - not_null
      - name: album_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_album')
                field: album_id
      - name: artist_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_artist')
                field: artist_id
      - name: genre_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_genre')
                field: genre_id
